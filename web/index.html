<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var app = document.querySelector('meta[name="mochi:app"]')
        var fp = document.querySelector('meta[name="mochi:fingerprint"]')
        var domain = document.querySelector('meta[name="mochi:domain"]')
        var base = '/'
        if (domain) base = '/'
        else if (fp && app) base = '/' + app.content + '/' + fp.content + '/'
        else if (fp) base = '/' + fp.content + '/'
        else if (app) base = '/' + app.content + '/'
        else { var m = location.pathname.match(/^\/([^/]+)/); if (m) base = '/' + m[1] + '/' }
        var el = document.createElement('base')
        el.href = base
        document.head.appendChild(el)
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Mochi &mdash; Your apps, your data, your network</title>
    <meta name="title" content="Mochi — Your apps, your data, your network" />
    <meta
      name="description"
      content="Mochi is a distributed application platform. Run feeds, forums, projects, CRM, and wikis on your own server, communicating peer-to-peer. Built with Go, libp2p, and Starlark."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mochi-os.org" />
    <meta property="og:title" content="Mochi — Your apps, your data, your network" />
    <meta
      property="og:description"
      content="Mochi is a distributed application platform. Run feeds, forums, projects, CRM, and wikis on your own server, communicating peer-to-peer."
    />
    <meta property="og:image" content="https://mochi-os.org/login/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Mochi — Your apps, your data, your network" />
    <meta
      property="twitter:description"
      content="Mochi is a distributed application platform. Run feeds, forums, projects, CRM, and wikis on your own server, communicating peer-to-peer."
    />
    <meta property="twitter:image" content="https://mochi-os.org/login/images/og-image.png" />

    <meta name="theme-color" content="#fff" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
